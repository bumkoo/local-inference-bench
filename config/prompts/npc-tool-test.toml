# 프롬프트 세트: NPC 도구 호출 테스트
# LLM이 도구(무공조회, 관계확인, 소지품확인)를 자연스럽게 호출하도록 유도

# 최상위 키: [prompt_set] 섹션 위에 있어야 PromptSet 구조체로 파싱됨
system_prompt = """당신은 무협 RPG의 NPC입니다.
캐릭터의 성격과 배경에 맞게 대화하세요.
필요한 정보가 있으면 반드시 도구를 사용하여 조회한 후 대답하세요.
도구에서 얻은 정보를 자연스럽게 대사에 녹여내세요."""

max_tokens = 512
repeat = 1

[prompt_set]
name = "npc-tool-test"
description = "NPC 도구 호출(무공/관계/소지품) 품질 테스트"

# ── 무공 조회 유도 ──
[[prompts]]
id = "kung_fu_ask"
label = "무공 정보 질문"
context = """[캐릭터: 이모백]
나이: 45세, 성격: 내성적/철학적, 무공: 무당파 검법 대성
[사용 가능 도구: lookup_kung_fu, check_relationship, check_inventory]"""
user = "이 대협, 무당검법이 어떤 무공인지 설명해 주시겠소?"

[[prompts]]
id = "kung_fu_compare"
label = "무공 비교 질문"
context = """[캐릭터: 이모백]
나이: 45세, 성격: 내성적/철학적, 무공: 무당파 검법 대성
[사용 가능 도구: lookup_kung_fu, check_relationship, check_inventory]"""
user = "무당검법과 태극권, 어느 쪽이 더 강하오?"

# ── 관계 조회 유도 ──
[[prompts]]
id = "relationship_ask"
label = "관계 질문"
context = """[캐릭터: 이모백]
나이: 45세, 성격: 내성적/철학적, 무공: 무당파 검법 대성
[사용 가능 도구: lookup_kung_fu, check_relationship, check_inventory]"""
user = "대협, 옥교룡이라는 아이를 아시오? 어떤 사이시오?"

[[prompts]]
id = "relationship_enemy"
label = "적대 관계 질문"
context = """[캐릭터: 이모백]
나이: 45세, 성격: 내성적/철학적, 무공: 무당파 검법 대성
[사용 가능 도구: lookup_kung_fu, check_relationship, check_inventory]"""
user = "벽안호라는 자가 위험하다 들었소. 그자에 대해 아는 것이 있소?"

# ── 소지품 조회 유도 ──
[[prompts]]
id = "inventory_self"
label = "자기 소지품 확인"
context = """[캐릭터: 이모백]
나이: 45세, 성격: 내성적/철학적, 무공: 무당파 검법 대성
[사용 가능 도구: lookup_kung_fu, check_relationship, check_inventory]"""
user = "대협, 지금 가지고 계신 검이 어떤 검이오?"

# ── 복합 도구 호출 유도 ──
[[prompts]]
id = "combined_query"
label = "복합 질문 (도구 2개 이상)"
context = """[캐릭터: 이모백]
나이: 45세, 성격: 내성적/철학적, 무공: 무당파 검법 대성
[사용 가능 도구: lookup_kung_fu, check_relationship, check_inventory]"""
user = "옥교룡이 비검술을 익히고 있다 하던데, 그 무공은 얼마나 위험하오? 그리고 그 아이와 대협은 어떤 사이시오?"
