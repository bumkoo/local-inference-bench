# NPC 지식 데이터 — 벡터 스토어에 적재할 문서들
# tools에 하드코딩된 데이터를 RAG용으로 재구성

# ── 무공 ──
[[documents]]
id = "kungfu_wudang_sword"
category = "무공"
text = "무당검법(武當劍法): 무당파 정통 검술. 이유극강(以柔克剛) — 부드러움으로 강함을 제압하는 원리. 내공 수련이 깊을수록 검의 위력이 배가됨. 대표 초식: 신문칠식(神門七式), 태극검법. 약점: 초기 전개가 느려 급습에 취약."

[[documents]]
id = "kungfu_flying_sword"
category = "무공"
text = "비검술(飛劍術): 청성파 계열 암기 검술. 검을 손에서 놓아 원거리 공격. 정확도 극상. 미완성 시 내력 소모가 극심하여 연속 사용 불가. 완성 시 백보천양(百步穿楊) 경지에 도달. 옥교룡이 현재 독학으로 수련 중이나 미완성 상태."

[[documents]]
id = "kungfu_nine_yang"
category = "무공"
text = "구양진경(九陽真經): 전설의 내공 심법. 순양(純陽)의 내력을 극대화. 한서불침(寒暑不侵) — 추위와 더위에 영향받지 않음. 모든 무공의 기초 내공으로 활용 가능."

[[documents]]
id = "kungfu_taichi"
category = "무공"
text = "태극권(太極拳): 무당파 권법. 사량발천근(四兩撥千斤) — 작은 힘으로 큰 힘을 흘려보냄. 공수일체(攻守一體). 방어와 공격이 하나. 노년의 고수일수록 위력이 강함. 장삼풍 진인이 창시."

# ── 인물 관계 ──
[[documents]]
id = "rel_yu_jiaolong"
category = "관계"
text = "옥교룡(玉嬌龍): 이모백과의 관계는 비공식 제자. 호감도 60/100. 반항적 성격으로 이모백이 가르치려 하나 거부하는 상황. 비검술을 독학 중. 최근 청명검을 몰래 가져간 전적 있음."

[[documents]]
id = "rel_yu_xiulian"
category = "관계"
text = "유수련(俞秀蓮): 이모백과의 관계는 연인(미고백). 호감도 95/100. 서로 마음을 알지만 예법에 묶여 고백하지 못함. 맹세형(孟世珩)의 약혼자였으나 사별. 강호 표국(鏢局)을 운영하는 여협."

[[documents]]
id = "rel_jade_fox"
category = "관계"
text = "벽안호 장(碧眼狐 張): 이모백과의 관계는 적대. 호감도 5/100. 위험 인물. 옥교룡의 스승(암흑면). 독문암기와 기문둔갑에 능함. 과거 이모백의 스승을 암살한 원수."

# ── 소지품 ──
[[documents]]
id = "inv_li_mubai"
category = "소지품"
text = "이모백 소지품: 청명검(靑冥劍) — 무림 십대 명검 중 하나. 4백년 역사. 현재 상태: 소지 중이나 은퇴와 함께 내려놓을 고민. 무당파 장문인 신표(信標). 금창약 3병."

[[documents]]
id = "inv_yu_jiaolong"
category = "소지품"
text = "옥교룡 소지품: 단검(暗器용). 벽안호 장에게 받은 독침 세트. 옥비녀(신분 위장용). 현재 청명검은 반환한 상태."

# ── 배경 설정 ──
[[documents]]
id = "bg_li_mubai"
category = "배경"
text = "이모백(李慕白): 무당파 수제자 출신. 45세. 내성적이고 철학적인 성격. 무당파 검법의 대성자. 강호 은퇴를 고민하며 청명검을 내려놓으려 하고 있다. 유수련에 대한 깊은 감정을 품고 있으나 표현하지 못한다."

[[documents]]
id = "bg_yu_jiaolong"
category = "배경"
text = "옥교룡(玉嬌龍): 관부 대인의 딸. 20세. 반항적이고 야심 있는 성격. 겉으로는 규수이나 뒤로는 벽안호 장에게 무공을 배웠다. 자유로운 강호 생활을 동경하며 정략결혼에 반발하고 있다."
