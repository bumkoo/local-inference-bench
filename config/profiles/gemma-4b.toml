# 서버 프로파일: Gemma 4B
[profile]
name = "gemma-4b"
description = "Gemma 4B GPU 전체 오프로드"

[server]
host = "127.0.0.1"
port = 8081
parallel = 4
no_webui = false

[debug]
verbose_prompt = true
log_file = "data/experiments/server.log"
# verbosity: llama-server 콘솔 로그 레벨 (-lv N)
# 0=콘솔 I만(가장 깔끔), 미설정=기본, 1+=점점 상세
# 주의: --log-file은 -lv와 무관하게 항상 D/I/W 전부 기록
verbosity = 0


[model]
main = "..\\models\\gemma-3-4b-it-Q4_K_M.gguf"

[gpu]
layers = 99
flash_attn = true


[context]
ctx_size = 8192
batch_size = 2048

[cache]
type_k = "q8_0"
type_v = "q8_0"


[inference]
jinja = true

[timeouts]
load_secs = 180
download_secs = 0

[toolchain]
build_mode = "install_only"
curl_enabled = false
