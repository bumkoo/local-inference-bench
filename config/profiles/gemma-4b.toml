# 서버 프로파일: Gemma 4B
[profile]
name = "gemma-4b"
description = "Gemma 4B GPU 전체 오프로드"

[server]
host = "127.0.0.1"
port = 8081
parallel = 4
no_webui = false

[model]
main = "..\\models\\gemma-3-4b-it-Q4_K_M.gguf"

[gpu]
layers = 99

[context]
ctx_size = 8192
batch_size = 1024

[debug]
verbose_prompt = true

[inference]
jinja = true

[timeouts]
load_secs = 180
download_secs = 0

[toolchain]
build_mode = "install_only"
curl_enabled = false
