# 서버 프로파일: Gemma 12B + 1B 스펙큘레이션
[profile]
name = "gemma-4b-spec"
description = "Gemma 4B"

[server]
host = "127.0.0.1"
port = 8081
ctx_size = 8192
batch_size = 1024
parallel = 4
no_webui = false

[model]
main = "..\\models\\gemma-3-4b-it-Q4_K_M.gguf"

[cache]
type_k = "q8_0"
type_v = "q8_0"


[timeouts]
load_secs = 180
download_secs = 0

[toolchain]
build_mode = "install_only"
curl_enabled = false
