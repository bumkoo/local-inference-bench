# 서버 프로파일: Gemma 12B
[profile]
name = "gemma-12b"
description = "Gemma 12B 메인 멀티 캐쉬"

[server]
host = "127.0.0.1"
port = 8081
parallel = 3
no_webui = false

[model]
main = "..\\models\\gemma-3-12b-it-Q3_K_M.gguf"

[gpu]
layers = 33
flash_attn = true


[cache]
type_k = "q8_0"
type_v = "q8_0"

[context]
ctx_size = 6144
batch_size = 1024

[timeouts]
load_secs = 180
download_secs = 0

[toolchain]
build_mode = "install_only"
curl_enabled = false
